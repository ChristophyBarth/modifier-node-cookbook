build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  active: true
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
  TooManyFunctions:
    active: false
  ComplexMethod:
    active: true
    threshold: 18

style:
  active: true
  MagicNumber:
    active: false
  WildcardImport:
    active: true
    excludes: ['**/*.gradle.kts']
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludes:
      - '**/test/**'
      - '**/*Test.kt'

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    active: true

empty-blocks:
  active: true

potential-bugs:
  active: true
  UnsafeCallOnNullableType:
    active: true
